# Default candidate adapters for emolog --serial auto.
#
# Each section describes one acceptable USB-serial adapter. Sections are
# priority-ordered: if matches come from different sections, the first
# section's match wins. Multiple matches against the same section is an
# error - disambiguate with a serial_number filter, or pass --serial COMx
# explicitly.
#
# Recognized keys (all optional; blank means "any"):
#   vid             hex (0x0403) or decimal
#   pid             hex (0x6014) or decimal
#   description     regex applied to the port description string
#   serial_number   regex applied to the adapter serial number
#
# Override by placing a serial_autodetect.ini in the current working
# directory, or pass --serial-autodetect PATH on the command line.

[FT232H]
vid = 0x0403
pid = 0x6014

[FT2232H]
vid = 0x0403
pid = 0x6010
